<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>天才俱乐部 Genius Club</title>
  <meta name="description" content="天才俱乐部：隐私、心事、爆料的匿名分享空间。" />
  <link rel="stylesheet" href="./styles.css?v=4" />
</head>
<body>
  <div class="noise"></div>
  <main class="app-shell">
    <section id="home" class="screen active-screen">
      <div class="hero-copy">
        <p id="homeEyebrow" class="eyebrow">GENIUS CLUB · 匿名内场</p>
        <h1 id="homeTitle">天才俱乐部</h1>
        <p id="homeSubtitle" class="subtitle">把不适合公开说的话，放进一个会漂浮的秘密房间。</p>
      </div>

      <div id="orbStage" class="orb-stage" aria-label="天才俱乐部入口"></div>

      <div class="home-actions">
        <button id="loginBtn" class="ghost-btn">登录 / 会员入口</button>
      </div>
    </section>

    <section id="feed" class="screen feed-screen">
      <header class="topbar">
        <button id="backBtn" class="icon-btn" aria-label="返回首页">←</button>
        <div>
          <p id="feedEyebrow" class="eyebrow">GENIUS CLUB</p>
          <h2 id="categoryTitle">隐私</h2>
        </div>
        <button id="shareBtn" class="primary-btn">匿名分享</button>
      </header>

      <div class="stats-card">
        <span id="memberStatus">访客模式</span>
        <span id="viewCount">今日已浏览 0 / 5</span>
      </div>

      <section id="postList" class="post-list" aria-live="polite"></section>
    </section>
  </main>

  <div id="postModal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <button class="close-btn" data-close="postModal">×</button>
      <p class="eyebrow">匿名发布</p>
      <h3 id="postModalTitle">分享你的秘密</h3>
      <label>
        标题
        <input id="postTitle" maxlength="30" placeholder="给这条内容起个名字" />
      </label>
      <label>
        内容
        <textarea id="postContent" maxlength="600" placeholder="写下你想匿名说出来的事……"></textarea>
      </label>
      <button id="submitPost" class="primary-btn full">提交审核</button>
    </div>
  </div>

  <div id="detailModal" class="modal" aria-hidden="true">
    <div class="modal-panel detail-panel">
      <button class="close-btn" data-close="detailModal">×</button>
      <p id="detailMeta" class="eyebrow">匿名成员 · 刚刚</p>
      <h3 id="detailTitle"></h3>
      <p id="detailContent" class="detail-content"></p>
      <div class="comment-box">
        <h4>评论区</h4>
        <div id="commentList" class="comment-list"></div>
        <div class="comment-input-row">
          <input id="commentInput" maxlength="120" placeholder="匿名评论一句……" />
          <button id="submitComment" class="primary-btn">提交审核</button>
        </div>
      </div>
    </div>
  </div>

  <div id="payModal" class="modal" aria-hidden="true">
    <div class="modal-panel pay-panel">
      <button class="close-btn" data-close="payModal">×</button>
      <p class="eyebrow">会员墙</p>
      <h3 id="payTitle">今天的免费阅读额度已经用完</h3>
      <p id="payText">每天可免费查看 5 条完整内容。会员功能正在内测，明天可以继续免费阅读。</p>
      <button id="mockPayBtn" class="primary-btn full">会员即将开放</button>
    </div>
  </div>

  <div id="loginModal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <button class="close-btn" data-close="loginModal">×</button>
      <p class="eyebrow">会员入口</p>
      <h3 id="loginTitle">会员功能内测中</h3>
      <p id="loginText" class="hint">当前阶段先开放每日免费阅读，后续再开放正式会员与支付。</p>
      <label>
        昵称
        <input id="nicknameInput" maxlength="16" placeholder="例如：匿名天才" />
      </label>
      <button id="submitLogin" class="primary-btn full">进入俱乐部</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="./site-data.js?v=4"></script>
  <script src="./gc-api.js?v=4"></script>
  <script src="./app.js?v=4"></script>
</body>
</html>
