<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>半句</title>
  <meta name="description" content="半句：记录那些没说完、没说出口的隐私、心事与生活片段。" />
  <link rel="stylesheet" href="./styles.css?v=14" />
  <link rel="stylesheet" href="./editorial.css?v=14" />
</head>
<body>
  <div class="noise"></div>
  <main class="app-shell">
    <section id="home" class="screen active-screen">
      <div class="hero-copy">
        <h1 id="homeTitle" class="brand-title">半句</h1>
        <p id="homeSubtitle" class="subtitle">那些没说完、没说出口的话，都留在这里。</p>
      </div>

      <div id="orbStage" class="orb-stage" aria-label="半句内容入口"></div>

      <div class="home-actions">
        <button id="loginBtn" class="ghost-btn" hidden>登录 / 会员入口</button>
      </div>
    </section>

    <section id="feed" class="screen feed-screen">
      <header class="topbar">
        <button id="backBtn" class="icon-btn" aria-label="返回首页">←</button>
        <div>
          <p id="feedEyebrow" class="eyebrow">半句</p>
          <h2 id="categoryTitle">隐私</h2>
        </div>
        <button id="shareBtn" class="primary-btn">新增文章</button>
      </header>

      <div class="stats-card">
        <span id="memberStatus">开放浏览</span>
        <span id="viewCount">内容持续更新</span>
      </div>

      <section id="postList" class="post-list" aria-live="polite"></section>
    </section>
  </main>

  <div id="postModal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <button class="close-btn" data-close="postModal">×</button>
      <p class="eyebrow">匿名新增</p>
      <h3 id="postModalTitle">新增一篇文章</h3>
      <p class="publish-note">发布后会直接显示在当前分类。请勿填写他人隐私、联系方式或违法违规内容。</p>
      <label>
        标题
        <input id="postTitle" maxlength="30" placeholder="给这条内容起个名字" />
      </label>
      <label>
        内容
        <textarea id="postContent" maxlength="1200" placeholder="写下你想匿名说出来的话……"></textarea>
      </label>
      <button id="submitPost" class="primary-btn full">发布文章</button>
    </div>
  </div>

  <div id="detailModal" class="modal" aria-hidden="true">
    <div class="modal-panel detail-panel">
      <button class="close-btn" data-close="detailModal">×</button>
      <p id="detailMeta" class="eyebrow">匿名读者 · 刚刚</p>
      <h3 id="detailTitle"></h3>
      <p id="detailContent" class="detail-content"></p>
      <div class="comment-box">
        <h4>评论区</h4>
        <div id="commentList" class="comment-list"></div>
        <div class="comment-input-row">
          <input id="commentInput" maxlength="200" placeholder="匿名评论一句，提交后直接公开……" />
          <button id="submitComment" class="primary-btn">发布评论</button>
        </div>
      </div>
    </div>
  </div>

  <div id="payModal" class="modal" aria-hidden="true">
    <div class="modal-panel pay-panel">
      <button class="close-btn" data-close="payModal">×</button>
      <p class="eyebrow">会员墙</p>
      <h3 id="payTitle">会员功能预留</h3>
      <p id="payText">当前版本全部内容开放浏览。</p>
      <button id="mockPayBtn" class="primary-btn full">返回内容</button>
    </div>
  </div>

  <div id="loginModal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <button class="close-btn" data-close="loginModal">×</button>
      <p class="eyebrow">会员入口</p>
      <h3 id="loginTitle">会员功能预留</h3>
      <p id="loginText" class="hint">当前版本无需登录即可浏览全部内容。</p>
      <label>
        昵称
        <input id="nicknameInput" maxlength="16" placeholder="例如：无名旅人" />
      </label>
      <button id="submitLogin" class="primary-btn full">返回内容</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="./site-data.js?v=14"></script>
  <script src="./gc-api.js?v=14"></script>
  <script src="./app.js?v=14"></script>
  <script src="./editorial-ui.js?v=14"></script>
  <script src="./brand-migration.js?v=14"></script>
</body>
</html>
