<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>天才俱乐部后台</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="./styles.css?v=4" />
  <link rel="stylesheet" href="./admin.css?v=4" />
</head>
<body>
  <div class="noise"></div>
  <main class="admin-shell">
    <header class="admin-header">
      <div>
        <p class="eyebrow">GENIUS CLUB ADMIN</p>
        <h1>内容后台</h1>
        <p class="subtitle admin-subtitle">管理首页、分类、文章、评论、会员墙和浏览规则。</p>
      </div>
      <a class="ghost-btn link-btn" href="./index.html">返回前台</a>
    </header>

    <section id="adminLoginCard" class="admin-card">
      <h2>进入后台</h2>
      <p id="adminModeHint" class="hint">当前使用腾讯云 CloudBase 国内后台，请输入管理员密码。</p>
      <label id="adminEmailLabel" class="hidden">
        管理员邮箱
        <input id="adminLoginEmail" type="email" />
      </label>
      <label>
        管理密码
        <input id="adminLoginPassword" type="password" placeholder="输入管理密码" autocomplete="current-password" />
      </label>
      <button id="adminLoginBtn" class="primary-btn full">进入管理</button>
    </section>

    <section id="adminWorkspace" class="admin-grid hidden">
      <article class="admin-card wide-card">
        <div class="section-head">
          <div>
            <p class="eyebrow">SITE COPY</p>
            <h2>首页与会员墙</h2>
          </div>
          <button id="saveSiteBtn" class="primary-btn">保存基础设置</button>
        </div>
        <div class="form-grid">
          <label>首页小字<input id="siteEyebrow" /></label>
          <label>首页大标题<input id="siteTitle" /></label>
          <label class="span-2">首页副标题<textarea id="siteSubtitle"></textarea></label>
          <label>信息流小字<input id="siteFeedEyebrow" /></label>
          <label>分享按钮文字<input id="siteShareButton" /></label>
          <label>访客标签<input id="siteVisitorLabel" /></label>
          <label>会员标签<input id="siteMemberLabel" /></label>
          <label>每日免费浏览条数<input id="siteViewLimit" type="number" min="0" /></label>
          <label>会员墙按钮<input id="sitePayButton" /></label>
          <label class="span-2">会员墙标题<input id="sitePayTitle" /></label>
          <label class="span-2">会员墙文案<textarea id="sitePayText"></textarea></label>
          <label class="span-2">会员说明<textarea id="siteLoginText"></textarea></label>
        </div>
      </article>

      <article class="admin-card">
        <div class="section-head">
          <div>
            <p class="eyebrow">CATEGORIES</p>
            <h2>三个入口</h2>
          </div>
          <button id="saveCategoryBtn" class="primary-btn">保存入口</button>
        </div>
        <label>选择入口<select id="categorySelect"></select></label>
        <label>入口名称<input id="categoryName" /></label>
        <label>入口小字<input id="categoryTagline" /></label>
      </article>

      <article class="admin-card">
        <div class="section-head">
          <div>
            <p class="eyebrow">DATA</p>
            <h2>数据工具</h2>
          </div>
        </div>
        <div class="tool-stack">
          <button id="exportDataBtn" class="ghost-btn full">导出当前内容 JSON</button>
          <button id="importDataBtn" class="ghost-btn full">导入下方 JSON</button>
          <button id="resetDataBtn" class="danger-btn full">恢复默认内容</button>
          <button id="clearMemberBtn" class="ghost-btn full">清除本机会员状态</button>
        </div>
        <label>JSON 数据<textarea id="dataJson" class="code-area" placeholder="导出或粘贴 JSON"></textarea></label>
      </article>

      <article class="admin-card wide-card">
        <div class="section-head">
          <div>
            <p class="eyebrow">POSTS</p>
            <h2>文章与评论</h2>
          </div>
          <div class="button-row">
            <button id="newPostBtn" class="ghost-btn">新建文章</button>
            <button id="deletePostBtn" class="danger-btn">删除文章</button>
            <button id="savePostBtn" class="primary-btn">保存文章</button>
          </div>
        </div>
        <div class="post-admin-layout">
          <aside class="post-admin-list" id="adminPostList"></aside>
          <div class="post-editor">
            <label>文章 ID<input id="postId" disabled /></label>
            <label>分类<select id="postCategory"></select></label>
            <label>标题<input id="postTitleAdmin" /></label>
            <label>正文<textarea id="postContentAdmin"></textarea></label>
            <label>评论，每行一条<textarea id="postCommentsAdmin"></textarea></label>
          </div>
        </div>
      </article>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="./site-data.js?v=4"></script>
  <script src="./gc-api.js?v=5"></script>
  <script src="./admin.js?v=4"></script>
</body>
</html>
